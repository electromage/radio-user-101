name: Build Printable PDFs

on:
  workflow_dispatch:

jobs:
  build-pdfs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-fonts-extra fonts-noto-core

      - name: Convert Markdown to PDF
        run: |
          mkdir -p pdfs
          for f in docs/*.md; do
            [ -e "$f" ] || continue
            echo "Converting $f..."
            pandoc "$f" \
              --pdf-engine=xelatex \
              -V mainfont="Noto Sans" \
              -V geometry:margin=0.75in \
              -V papersize=letter \
              -V fontsize=10pt \
              -o "pdfs/$(basename "${f%.md}").pdf"
          done

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: printable-pdfs
          path: pdfs/
          retention-days: 90
          if-no-files-found: ignore
