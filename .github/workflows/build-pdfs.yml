name: Build Printable PDFs

on:
  push:
    branches:
      - main
    paths:
      - '**.md'

jobs:
  build-pdfs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-fonts-extra

      - name: Convert Markdown to PDF
        run: |
          mkdir -p pdfs
          for f in *.md; do
            [ -e "$f" ] || continue
            [ "$f" = "README.md" ] && continue
            echo "Converting $f..."
            pandoc "$f" \
              --pdf-engine=xelatex \
              -V geometry:margin=0.75in \
              -V papersize=letter \
              -V fontsize=10pt \
              -o "pdfs/${f%.md}.pdf"
          done

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: printable-pdfs
          path: pdfs/
          retention-days: 90
          if-no-files-found: ignore
